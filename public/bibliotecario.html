<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biblioteca - Painel do Bibliotecário</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="header">
    <div class="header-content">
      <h1>📚 Biblioteca</h1>
      <div class="header-user">
        <span>Olá, <strong id="nome-usuario"></strong></span>
        <span class="badge badge-green">Bibliotecário</span>
        <button onclick="logout()" class="btn btn-outline">Sair</button>
      </div>
    </div>
  </header>

  <main class="container">
    <div id="mensagem" class="mensagem hidden"></div>

    <div class="tabs">
      <button class="tab-nav active" onclick="mostrarSecao('livros')">Acervo de Livros</button>
      <button class="tab-nav" onclick="mostrarSecao('emprestimos')">Empréstimos</button>
    </div>

    <section id="secao-livros">
      <div class="section-header">
        <h2>Gerenciar Livros</h2>
        <button onclick="mostrarFormLivro()" class="btn btn-primary">+ Novo Livro</button>
      </div>

      <div id="form-livro-container" class="card hidden">
        <h3 id="form-livro-titulo">Cadastrar Novo Livro</h3>
        <form id="form-livro">
          <input type="hidden" id="livro-id">
          <div class="form-row">
            <div class="form-group">
              <label for="livro-titulo">Título *</label>
              <input type="text" id="livro-titulo" required>
            </div>
            <div class="form-group">
              <label for="livro-autor">Autor *</label>
              <input type="text" id="livro-autor" required>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="livro-ano">Ano de Publicação</label>
              <input type="number" id="livro-ano" min="1000" max="2099">
            </div>
            <div class="form-group">
              <label for="livro-qtd">Quantidade Disponível *</label>
              <input type="number" id="livro-qtd" min="0" required>
            </div>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn btn-primary">Salvar</button>
            <button type="button" onclick="cancelarFormLivro()" class="btn btn-outline">Cancelar</button>
          </div>
        </form>
      </div>

      <div class="card">
        <div class="table-wrapper">
          <table id="tabela-livros">
            <thead>
              <tr>
                <th>ID</th>
                <th>Título</th>
                <th>Autor</th>
                <th>Ano</th>
                <th>Disponível</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="corpo-livros">
              <tr><td colspan="6" class="empty">Carregando...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </section>

    <section id="secao-emprestimos" class="hidden">
      <div class="section-header">
        <h2>Gerenciar Empréstimos</h2>
        <button onclick="carregarEmprestimos()" class="btn btn-outline">↻ Atualizar</button>
      </div>

      <div class="card">
        <div class="table-wrapper">
          <table id="tabela-emprestimos">
            <thead>
              <tr>
                <th>ID</th>
                <th>Leitor</th>
                <th>Livro</th>
                <th>Data Empréstimo</th>
                <th>Previsão Devolução</th>
                <th>Status</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="corpo-emprestimos">
              <tr><td colspan="7" class="empty">Carregando...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <script src="/js/bibliotecario.js"></script>
</body>
</html>
